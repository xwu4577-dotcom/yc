<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五层全动态交互八字排盘 (大字号+农历流日版)</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        :root {
            --bg-gray: #f7f8fa; 
            --border-color: #ebebeb;
            --active-bg: #fff6e5; 
            --active-border: #f57c00;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: #eef0f3; color: var(--text-main); }
        .app-container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 4px 20px rgba(0,0,0,0.06); padding-bottom: 20px; position: relative;}
        
        .input-section { padding: 12px 15px; background: #fff; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px;}
        .input-row { display: flex; gap: 8px; align-items: center; }
        .input-section input, .input-section select { flex: 1; padding: 10px 8px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-size: 15px; min-width: 0; outline: none; transition: border-color 0.2s;}
        .input-section input:focus, .input-section select:focus { border-color: #d4af37; }
        .input-label { font-size: 13px; color: var(--text-muted); white-space: nowrap; width: 45px;}

        .btn-locate { padding: 9px 10px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap; box-shadow: 0 2px 6px rgba(46,204,113,0.2);}
        .btn-locate:active { background-color: #27ae60; transform: translateY(1px);}
        .btn-locate:disabled { background-color: #bdc3c7; cursor: not-allowed; box-shadow: none;}

        .btn-group { display: flex; gap: 10px; width: 100%; margin-top: 4px;}
        .btn-main { flex: 3; padding: 12px; background-color: #d4af37; color: #fff; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 8px rgba(212,175,55,0.3);}
        .btn-main:active { background-color: #b8972e; transform: translateY(1px);}
        .btn-sub { flex: 1; padding: 12px; background-color: #3498db; color: #fff; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 8px rgba(52,152,219,0.3);}
        .btn-sub:active { background-color: #2980b9; transform: translateY(1px);}

        .header-section { background: #2c3e50; color: #fff; padding: 12px 15px; }
        .header-section h3 { margin: 0 0 6px 0; font-size: 17px; font-weight: 600; letter-spacing: 0.5px;}
        .user-info p { margin: 3px 0; font-size: 13px; color: #bdc3c7; display: flex; justify-content: space-between;}
        .true-time-highlight { color: #f1c40f; font-weight: bold; }

        .bazi-grid { display: grid; grid-template-columns: 1fr repeat(4, 1fr); text-align: center; border-bottom: 8px solid var(--bg-gray); }
        .grid-cell { padding: 8px 2px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); font-size: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .col-header { background-color: var(--bg-gray); color: var(--text-muted); font-size: 13px; padding: 8px 0; font-weight: 500;}
        .row-label { background-color: #fff; color: var(--text-muted); font-size: 13px; text-align: left; padding-left: 10px; align-items: flex-start;}
        
        #mainGrid .ganzhi-text { font-size: 22px; font-weight: bold; margin: 2px 0; line-height: 1.2; }
        
        /* 原局藏干字号放大 */
        .cg-container { display: flex; flex-direction: column; gap: 4px; width: 100%; padding: 4px 0; }
        .cg-row { display: flex; justify-content: center; align-items: center; gap: 6px; }
        .cg-gan { font-size: 15px; font-weight: bold; } /* 原14px，提至15px */
        .cg-ss { font-size: 13px; color: #777; width: 2.2em; text-align: left; line-height: 1.1; font-weight: 500;} /* 原12px，提至13px */

        .xingyun-text { font-size: 14px; color: #2c3e50; font-weight: bold; margin: 2px 0;}
        .shensha-container { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; padding: 3px 0;}
        .shensha-tag { font-size: 11px; color: #c0392b; background-color: #fdf2e9; padding: 2px 4px; border-radius: 4px; line-height: 1.2;}

        .timeline-container { font-size: 13px; }
        .qiyun-bar { padding: 10px 15px; background: #fff; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-size: 13px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
        .now-btn { background-color: #e67e22; color: #fff; border: none; border-radius: 4px; padding: 5px 12px; font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 4px rgba(230,126,34,0.3); transition: background 0.2s;}
        .now-btn:active { background-color: #d35400; }
        
        .scroll-wrapper { display: flex; background: #fff; border-bottom: 1px solid var(--border-color); }
        .row-title { width: 42px; text-align: center; color: var(--text-muted); font-size: 13px; font-weight: 500; border-right: 1px solid var(--border-color); background: var(--bg-gray); flex-shrink: 0; display: flex; align-items: center; justify-content: center;}
        .scroll-row { display: flex; overflow-x: auto; flex: 1; cursor: grab; user-select: none; -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-row::-webkit-scrollbar { display: none; }
        .scroll-row.active-drag { cursor: grabbing; }
        
        /* 再次微调格子宽度，防止大字号把格子撑破 */
        .item-box { min-width: 62px; padding: 10px 2px; text-align: center; border-right: 1px solid var(--border-color); flex-shrink: 0; transition: background 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;}
        .item-box.active { background-color: var(--active-bg); border-bottom: 2px solid var(--active-border); }
        .top-text { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; line-height: 1.2;}
        
        .scroll-row .ganzhi-text { font-size: 18px; font-weight: bold; line-height: 1.2;}
        .ss-text { font-size: 12px; color: #888; margin-right: 3px; font-weight: 500; }
        .gz-row { display: flex; align-items: center; justify-content: center; width: 100%; line-height: 1.3;}

        /* ====== 终极字号放大版：微缩藏干 ====== */
        .cg-mini-box { display: flex; flex-direction: row; justify-content: center; margin-top: 6px; border-top: 1px dashed #e0e0e0; padding-top: 6px; gap: 5px; width: 100%;}
        .cg-mini-item { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2px; line-height: 1; }
        /* 取消 scale(0.95)，硬核调大字号 */
        .cg-mini-ss { color: #777; font-size: 12px; font-weight: 500; } /* 原10px，提至12px */
        .cg-mini-gan { font-weight: bold; font-size: 13px; } /* 原12px，提至13px */

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(2px);}
        .modal-content { background: #fff; width: 90%; max-width: 400px; max-height: 80vh; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
        .modal-header { padding: 15px; background: #2c3e50; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h4 { margin: 0; font-size: 16px; font-weight: 500;}
        .close-btn { cursor: pointer; font-size: 22px; color: #bdc3c7; transition: color 0.2s;}
        .close-btn:hover { color: #fff; }
        .record-list { flex: 1; overflow-y: auto; padding: 12px; background: var(--bg-gray); }
        .record-item { background: #fff; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .record-info strong { display: block; font-size: 15px; margin-bottom: 4px; color: var(--text-main);}
        .record-info span { font-size: 12px; color: var(--text-muted); }
        .record-actions { display: flex; gap: 8px; }
        .record-actions button { padding: 6px 10px; border: none; border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer; color: white;}
        .btn-use { background-color: #d4af37; }
        .btn-del { background-color: #e74c3c; }
        .empty-tip { text-align: center; color: #999; padding: 30px 20px; font-size: 14px; }

        #toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background-color: rgba(44, 62, 80, 0.9); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 2000; display: none; pointer-events: none; box-shadow: 0 6px 16px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="toast">操作成功</div>

    <div class="input-section">
        <div class="input-row">
            <input type="text" id="userName" placeholder="姓名/备注" value="测试">
            <select id="gender" style="flex: 0.4;">
                <option value="1">乾造(男)</option>
                <option value="0">坤造(女)</option>
            </select>
        </div>
        <div class="input-row">
            <input type="datetime-local" id="birthTime" value="1995-02-06T02:00">
        </div>
        
        <div class="input-row">
            <div class="input-label">地点</div>
            <input type="text" id="cityName" placeholder="如: 河北保定" style="flex: 1;" onkeydown="if(event.key==='Enter') fetchLongitude()">
            <button class="btn-locate" id="locateBtn" onclick="fetchLongitude()">智能定位</button>
        </div>
        <div class="input-row">
            <div class="input-label">经度</div>
            <input type="number" id="longitude" value="120.00" step="0.01" style="flex: 1; background-color: #fffde7;" title="可直接手动修改">
            <span style="font-size: 13px; color: #888; width: 20px;">°E</span>
        </div>

        <div class="btn-group">
            <button class="btn-main" onclick="initPan(false)">排 盘 (点击存档)</button>
            <button class="btn-sub" onclick="openRecordsModal()">历史档案</button>
        </div>
    </div>

    <div class="header-section">
        <h3 id="uiName">命盘信息</h3>
        <div class="user-info">
            <p>表定时间：<span id="uiClockTime">-</span></p>
        </div>
        <div class="user-info">
            <p class="true-time-highlight">真太阳时：<span id="uiTrueTime">-</span></p>
        </div>
        <div class="user-info">
            <p>八字阴历：<span id="uiLunar">-</span></p>
        </div>
    </div>

    <div class="bazi-grid" id="mainGrid"></div>

    <div class="timeline-container">
        <div class="qiyun-bar">
            <span id="qiyunText">起运：-</span>
            <button class="now-btn" onclick="snapToNow()">回到今日</button>
        </div>
        <div class="scroll-wrapper"><div class="row-title">大运</div><div class="scroll-row" id="dayunRow"></div></div>
        <div class="scroll-wrapper"><div class="row-title">流年</div><div class="scroll-row" id="liunianRow"></div></div>
        <div class="scroll-wrapper"><div class="row-title">流月</div><div class="scroll-row" id="liuyueRow"></div></div>
        <div class="scroll-wrapper"><div class="row-title" style="color:#d4af37;">流日</div><div class="scroll-row" id="liuriRow"></div></div>
        <div class="scroll-wrapper"><div class="row-title" style="color:#e69138;">流时</div><div class="scroll-row" id="liushiRow"></div></div>
    </div>

    <div class="modal-overlay" id="recordsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h4>历史档案管理</h4>
                <span class="close-btn" onclick="closeRecordsModal()">&times;</span>
            </div>
            <div class="record-list" id="recordListContainer"></div>
        </div>
    </div>
</div>

<script>
    let globalDaYuns = []; 
    let globalDayGan = ''; 
    let isDragging = false; 
    let isInitialLoad = true; 
    let globalTrueSolarDate = null; 
    const STORAGE_KEY = 'bazi_records_v16'; 
    const LAST_STATE_KEY = 'bazi_last_state_v16'; 

    async function fetchLongitude() {
        const cityInput = document.getElementById('cityName').value.trim();
        if (!cityInput) {
            alert("请输入要定位的城市名称！");
            return;
        }

        const localCityLon = {
            "北京":116.40,"上海":121.47,"天津":117.20,"重庆":106.55,"哈尔滨":126.63,"长春":125.32,"沈阳":123.43,
            "呼和浩特":111.67,"石家庄":114.48,"保定":115.48,"太原":112.53,"大同":113.30,"济南":117.00,"青岛":117.32,
            "郑州":113.62,"西安":108.94,"兰州":103.82,"银川":106.27,"西宁":101.78,"乌鲁木齐":87.68,"合肥":117.22,
            "南京":118.78,"苏州":120.58,"杭州":120.15,"宁波":121.55,"温州":121.55,"长沙":112.98,"南昌":115.89,
            "武汉":114.31,"成都":104.06,"贵阳":106.57,"昆明":102.71,"南宁":108.32,"广州":113.23,"深圳":114.05,
            "东莞":113.75,"福州":119.30,"厦门":118.08,"泉州":118.58,"海口":110.32,"三亚":110.25,"拉萨":91.11
        };

        let matchedLon = null;
        for (let key in localCityLon) {
            if (cityInput.includes(key)) {
                matchedLon = localCityLon[key];
                break;
            }
        }

        if (matchedLon) {
            document.getElementById('longitude').value = matchedLon.toFixed(2);
            showToast(`本地定位: ${matchedLon.toFixed(2)}°`);
            initPan(true); 
            return;
        }

        const btn = document.getElementById('locateBtn');
        const originalText = btn.innerText;
        btn.innerText = "搜索中...";
        btn.disabled = true;

        try {
            const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityInput)}&count=1&language=zh`);
            const data = await response.json();
            if (data && data.results && data.results.length > 0) {
                const lon = parseFloat(data.results[0].longitude).toFixed(2);
                document.getElementById('longitude').value = lon;
                showToast(`云端定位: ${lon}°`);
                initPan(true); 
            } else {
                alert(`未能智能查到 "${cityInput}" 的坐标。\n请尝试只输入核心城市名，或手动查阅后在黄框内直接输入数字。`);
            }
        } catch (error) {
            alert("网络请求被拦截，请尝试输入大城市名称（已内置本地字典），或手动输入数字。");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    function getEquationOfTime(date) {
        const start = new Date(date.getFullYear(), 0, 0);
        const diff = date - start;
        const oneDay = 1000 * 60 * 60 * 24;
        const dayOfYear = Math.floor(diff / oneDay);
        const B = 2 * Math.PI * (dayOfYear - 81) / 365;
        return 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
    }

    function calculateTrueSolarTime(baseDate, longitude) {
        const lonDiffMinutes = (longitude - 120) * 4;
        const eotMinutes = getEquationOfTime(baseDate);
        const totalCorrectionMs = (lonDiffMinutes + eotMinutes) * 60 * 1000;
        return new Date(baseDate.getTime() + totalCorrectionMs);
    }

    function formatDateStr(date) {
        const pad = n => n.toString().padStart(2, '0');
        return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1500);
    }

    function autoSaveRecord(name, gender, time, lon, cityName) {
        if (!name || !time) return; 
        if (isInitialLoad) return; 

        try {
            let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const newRecord = { 
                id: Date.now(), 
                name: name, 
                gender: gender, 
                time: time, 
                lon: lon || 120, 
                cityName: cityName || '', 
                dateStr: new Date().toLocaleString() 
            };
            records.unshift(newRecord); 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            showToast("已排盘并存入档案");
        } catch(e) { console.error("本地保存失败", e); }
    }

    function saveLastState(name, gender, time, lon, cityName) {
        try {
            const state = { name, gender, time, lon, cityName };
            localStorage.setItem(LAST_STATE_KEY, JSON.stringify(state));
        } catch(e) {
            console.error("保存记忆状态失败", e);
        }
    }

    function openRecordsModal() { renderRecords(); document.getElementById('recordsModal').style.display = 'flex'; }
    function closeRecordsModal() { document.getElementById('recordsModal').style.display = 'none'; }

    function renderRecords() {
        const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const container = document.getElementById('recordListContainer');
        if (records.length === 0) return container.innerHTML = '<div class="empty-tip">暂无记录，点击【排盘】按钮即可保存</div>';
        let html = '';
        records.forEach(r => {
            const genderStr = r.gender == '1' ? '乾造' : '坤造';
            const cityDisplay = r.cityName ? `(${r.cityName})` : '';
            html += `
                <div class="record-item">
                    <div class="record-info">
                        <strong>${r.name} <span style="font-size:12px; color:#d4af37;">${genderStr}</span></strong>
                        <span>${r.time.replace('T', ' ')} ${cityDisplay}</span>
                    </div>
                    <div class="record-actions">
                        <button class="btn-use" onclick="useRecord('${r.id}')">调出</button>
                        <button class="btn-del" onclick="deleteRecord('${r.id}')">删除</button>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function useRecord(id) {
        const record = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]').find(r => r.id == id);
        if (record) {
            document.getElementById('userName').value = record.name;
            document.getElementById('gender').value = record.gender;
            document.getElementById('birthTime').value = record.time;
            document.getElementById('longitude').value = record.lon || 120.00;
            document.getElementById('cityName').value = record.cityName || '';
            
            closeRecordsModal();
            isInitialLoad = true; 
            initPan(true);
            setTimeout(() => isInitialLoad = false, 500); 
        }
    }

    function deleteRecord(id) {
        if (!confirm('确定彻底删除此档案吗？')) return;
        let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]').filter(r => r.id != id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        renderRecords();
    }

    const SHI_SHEN_MAP = {
        '甲': {'甲':'比肩','乙':'劫财','丙':'食神','丁':'伤官','戊':'偏财','己':'正财','庚':'七杀','辛':'正官','壬':'偏印','癸':'正印'},
        '乙': {'甲':'劫财','乙':'比肩','丙':'伤官','丁':'食神','戊':'正财','己':'偏财','庚':'正官','辛':'七杀','壬':'正印','癸':'偏印'},
        '丙': {'甲':'偏印','乙':'正印','丙':'比肩','丁':'劫财','戊':'食神','己':'伤官','庚':'偏财','辛':'正财','壬':'七杀','癸':'正官'},
        '丁': {'甲':'正印','乙':'偏印','丙':'劫财','丁':'比肩','戊':'伤官','己':'食神','庚':'正财','辛':'偏财','壬':'正官','癸':'七杀'},
        '戊': {'甲':'七杀','乙':'正官','丙':'偏印','丁':'正印','戊':'比肩','己':'劫财','庚':'食神','辛':'伤官','壬':'偏财','癸':'正财'},
        '己': {'甲':'正官','乙':'七杀','丙':'正印','丁':'偏印','戊':'劫财','己':'比肩','庚':'伤官','辛':'食神','壬':'正财','癸':'偏财'},
        '庚': {'甲':'偏财','乙':'正财','丙':'七杀','丁':'正官','戊':'偏印','己':'正印','庚':'比肩','辛':'劫财','壬':'食神','癸':'伤官'},
        '辛': {'甲':'正财','乙':'偏财','丙':'正官','丁':'七杀','戊':'正印','己':'偏印','庚':'劫财','辛':'比肩','壬':'伤官','癸':'食神'},
        '壬': {'甲':'食神','乙':'伤官','丙':'偏财','丁':'正财','戊':'七杀','己':'正官','庚':'偏印','辛':'正印','壬':'比肩','癸':'劫财'},
        '癸': {'甲':'伤官','乙':'食神','丙':'正财','丁':'偏财','戊':'正官','己':'七杀','庚':'正印','辛':'偏印','壬':'劫财','癸':'比肩'}
    };
    
    const ZHI_ALL_HIDE_GAN = {
        '子': ['癸'], '丑': ['己', '癸', '辛'], '寅': ['甲', '丙', '戊'], '卯': ['乙'], '辰': ['戊', '乙', '癸'], '巳': ['丙', '戊', '庚'],
        '午': ['丁', '己'], '未': ['己', '丁', '乙'], '申': ['庚', '壬', '戊'], '酉': ['辛'], '戌': ['戊', '辛', '丁'], '亥': ['壬', '甲']
    };
    
    const SHORT_SHI_SHEN = { '比肩':'比', '劫财':'劫', '食神':'食', '伤官':'伤', '偏财':'才', '正财':'财', '七杀':'杀', '正官':'官', '偏印':'枭', '正印':'印' };

    const DI_SHI_MAP = {
        '甲': ['亥','子','丑','寅','卯','辰','巳','午','未','申','酉','戌'],
        '丙': ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'],
        '戊': ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'],
        '庚': ['巳','午','未','申','酉','戌','亥','子','丑','寅','卯','辰'],
        '壬': ['申','酉','戌','亥','子','丑','寅','卯','辰','巳','午','未'],
        '乙': ['午','巳','辰','卯','寅','丑','子','亥','戌','酉','申','未'],
        '丁': ['酉','申','未','午','巳','辰','卯','寅','丑','子','亥','戌'],
        '己': ['酉','申','未','午','巳','辰','卯','寅','丑','子','亥','戌'],
        '辛': ['子','亥','戌','酉','申','未','午','巳','辰','卯','寅','丑'],
        '癸': ['卯','寅','丑','子','亥','戌','酉','申','未','午','巳','辰']
    };
    const ZHANG_SHENG_ARR = ['长生','沐浴','冠带','临官','帝旺','衰','病','死','墓','绝','胎','养'];

    function getDiShi(dayGan, zhi) {
        if(!DI_SHI_MAP[dayGan]) return '';
        let idx = DI_SHI_MAP[dayGan].indexOf(zhi);
        return idx > -1 ? ZHANG_SHENG_ARR[idx] : '';
    }

    function getShenSha(dayGan, yearZhi, dayZhi, targetZhi) {
        let ss = [];
        const tianYi = { '甲':['丑','未'], '戊':['丑','未'], '庚':['丑','未'], '乙':['子','申'], '己':['子','申'], '丙':['亥','酉'], '丁':['亥','酉'], '壬':['卯','巳'], '癸':['卯','巳'], '辛':['午','寅'] };
        if(tianYi[dayGan] && tianYi[dayGan].includes(targetZhi)) ss.push('天乙');
        const yangRen = {'甲':'卯','乙':'寅','丙':'午','戊':'午','丁':'巳','己':'巳','庚':'酉','辛':'申','壬':'子','癸':'亥'};
        if(yangRen[dayGan] === targetZhi) ss.push('羊刃');
        const luShen = {'甲':'寅','乙':'卯','丙':'巳','戊':'巳','丁':'午','己':'午','庚':'申','辛':'酉','壬':'亥','癸':'子'};
        if(luShen[dayGan] === targetZhi) ss.push('禄神');
        const wenChang = {'甲':'巳','乙':'午','丙':'申','戊':'申','丁':'酉','己':'酉','庚':'亥','辛':'子','壬':'寅','癸':'卯'};
        if(wenChang[dayGan] === targetZhi) ss.push('文昌');
        const yiMa = { '申':'寅','子':'寅','辰':'寅', '寅':'申','午':'申','戌':'申', '巳':'亥','酉':'亥','丑':'亥', '亥':'巳','卯':'巳','未':'巳' };
        if(yiMa[yearZhi] === targetZhi || yiMa[dayZhi] === targetZhi) if(!ss.includes('驿马')) ss.push('驿马');
        const taoHua = { '申':'酉','子':'酉','辰':'酉', '寅':'卯','午':'卯','戌':'卯', '巳':'午','酉':'午','丑':'午', '亥':'子','卯':'子','未':'子' };
        if(taoHua[yearZhi] === targetZhi || taoHua[dayZhi] === targetZhi) if(!ss.includes('桃花')) ss.push('桃花');
        return ss;
    }

    function getColor(char) {
        if ('庚辛申酉'.includes(char)) return '#e69138';
        if ('甲乙寅卯'.includes(char)) return '#38761d';
        if ('壬癸子亥'.includes(char)) return '#1155cc';
        if ('丙丁巳午'.includes(char)) return '#cc0000';
        if ('戊己辰戌丑未'.includes(char)) return '#b45f06';
        return '#333';
    }

    function getSS(dayGan, char, isZhi = false, useShort = true) {
        if(!dayGan || !char) return '';
        let target = isZhi ? ZHI_ALL_HIDE_GAN[char][0] : char; 
        let full = SHI_SHEN_MAP[dayGan][target];
        return useShort ? (SHORT_SHI_SHEN[full] || full) : full;
    }

    function formatMiniCangGan(dayGan, zhi) {
        let gans = ZHI_ALL_HIDE_GAN[zhi] || [];
        let html = `<div class="cg-mini-box">`;
        gans.forEach(gan => {
            let ss = getSS(dayGan, gan, false, true); 
            let color = getColor(gan);
            html += `<div class="cg-mini-item"><span class="cg-mini-ss">${ss}</span><span class="cg-mini-gan" style="color:${color}">${gan}</span></div>`;
        });
        html += `</div>`;
        return html;
    }

    function formatShenSha(ssArray) {
        if (!ssArray || ssArray.length === 0) return '-';
        return `<div class="shensha-container">` + ssArray.map(n => `<span class="shensha-tag">${n}</span>`).join('') + `</div>`;
    }

    function initPan(isSilentLoad = false) {
        let nameInput = document.getElementById('userName').value.trim();
        const gender = parseInt(document.getElementById('gender').value);
        const dateStr = document.getElementById('birthTime').value;
        const cityName = document.getElementById('cityName').value.trim();
        const longitude = parseFloat(document.getElementById('longitude').value) || 120.00;
        
        if(!nameInput) nameInput = '未命名';
        if(!dateStr) return alert("请填写出生时间");
        
        saveLastState(nameInput, gender, dateStr, longitude, cityName);

        if (!isSilentLoad) {
            autoSaveRecord(nameInput, gender, dateStr, longitude, cityName);
        }

        const baseDate = new Date(dateStr);
        globalTrueSolarDate = calculateTrueSolarTime(baseDate, longitude);
        
        const lunar = Lunar.fromDate(globalTrueSolarDate);
        const bazi = lunar.getEightChar();
        const yun = bazi.getYun(gender);
        
        globalDayGan = bazi.getDayGan();
        globalDaYuns = yun.getDaYun();

        const genderText = gender === 1 ? '乾造' : '坤造';
        document.getElementById('uiName').innerText = `${nameInput} (${genderText})`;
        
        document.getElementById('uiClockTime').innerText = formatDateStr(baseDate);
        document.getElementById('uiTrueTime').innerText = formatDateStr(globalTrueSolarDate) + ` (修正${Math.round((globalTrueSolarDate - baseDate)/60000)}分钟)`;
        
        document.getElementById('uiLunar').innerText = `${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月 ${lunar.getDayInChinese()} ${bazi.getTimeZhi()}时`;
        document.getElementById('qiyunText').innerText = `起运：出生后 ${yun.getStartYear()}年 ${yun.getStartMonth()}月 ${yun.getStartDay()}天`;

        renderBaseGrid(bazi);
        renderDaYunList(); 
    }

    function renderBaseGrid(bazi) {
        const yearZhi = bazi.getYearZhi();
        const dayZhi = bazi.getDayZhi();

        const pillars = [
            { t: '年柱', g: bazi.getYearGan(), z: yearZhi, cg: bazi.getYearHideGan(), diShi: getDiShi(globalDayGan, yearZhi), shenSha: getShenSha(globalDayGan, yearZhi, dayZhi, yearZhi) },
            { t: '月柱', g: bazi.getMonthGan(), z: bazi.getMonthZhi(), cg: bazi.getMonthHideGan(), diShi: getDiShi(globalDayGan, bazi.getMonthZhi()), shenSha: getShenSha(globalDayGan, yearZhi, dayZhi, bazi.getMonthZhi()) },
            { t: '日柱', g: bazi.getDayGan(), z: dayZhi, cg: bazi.getDayHideGan(), diShi: getDiShi(globalDayGan, dayZhi), shenSha: getShenSha(globalDayGan, yearZhi, dayZhi, dayZhi) },
            { t: '时柱', g: bazi.getTimeGan(), z: bazi.getTimeZhi(), cg: bazi.getTimeHideGan(), diShi: getDiShi(globalDayGan, bazi.getTimeZhi()), shenSha: getShenSha(globalDayGan, yearZhi, dayZhi, bazi.getTimeZhi()) }
        ];

        let html = `<div class="grid-cell col-header row-label">四柱</div>`;
        pillars.forEach(p => html += `<div class="grid-cell col-header">${p.t}</div>`);
        
        html += `<div class="grid-cell row-label">主星</div>`;
        pillars.forEach(p => {
            let ss = (p.t === '日柱') ? '元男' : getSS(globalDayGan, p.g, false, false);
            let highlight = (p.t === '日柱') ? 'color:#1155cc; font-weight:bold;' : 'color:#555;';
            html += `<div class="grid-cell"><span style="font-size:13px; ${highlight}">${ss}</span></div>`;
        });

        html += `<div class="grid-cell row-label">天干</div>`;
        pillars.forEach(p => html += `<div class="grid-cell"><span class="ganzhi-text" style="color:${getColor(p.g)}">${p.g}</span></div>`);
        
        html += `<div class="grid-cell row-label">地支</div>`;
        pillars.forEach(p => html += `<div class="grid-cell"><span class="ganzhi-text" style="color:${getColor(p.z)}">${p.z}</span></div>`);
        
        html += `<div class="grid-cell row-label" style="align-items:flex-start; padding-top:12px;">藏干</div>`;
        pillars.forEach(p => {
            let cgHtml = `<div class="cg-container">`;
            p.cg.forEach(gan => {
                cgHtml += `<div class="cg-row"><span class="cg-gan" style="color:${getColor(gan)}">${gan}</span><span class="cg-ss">${getSS(globalDayGan, gan, false, false)}</span></div>`;
            });
            cgHtml += `</div>`;
            html += `<div class="grid-cell">${cgHtml}</div>`;
        });

        html += `<div class="grid-cell row-label">星运</div>`;
        pillars.forEach(p => html += `<div class="grid-cell"><span class="xingyun-text">${p.diShi}</span></div>`);

        html += `<div class="grid-cell row-label" style="align-items:flex-start; padding-top:6px;">神煞</div>`;
        pillars.forEach(p => html += `<div class="grid-cell" style="justify-content:flex-start;">${formatShenSha(p.shenSha)}</div>`);

        document.getElementById('mainGrid').innerHTML = html;
    }

    function renderDaYunList() {
        let html = '';
        for (let i = 0; i < 10; i++) { 
            if(!globalDaYuns[i]) continue;
            const dy = globalDaYuns[i];
            const gz = dy.getGanZhi();
            const gan = gz.charAt(0); const zhi = gz.charAt(1);
            html += `
                <div class="item-box" id="dy-box-${i}" onclick="selectDaYun(${i})">
                    <div class="top-text">${dy.getStartYear()}年</div>
                    <div class="top-text">${dy.getStartAge()}岁</div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, gan, false, true)}</span><span class="ganzhi-text" style="color:${getColor(gan)}">${gan}</span></div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, zhi, true, true)}</span><span class="ganzhi-text" style="color:${getColor(zhi)}">${zhi}</span></div>
                    ${formatMiniCangGan(globalDayGan, zhi)}
                </div>`;
        }
        document.getElementById('dayunRow').innerHTML = html;
        selectDaYun(0); 
    }

    function selectDaYun(dyIndex) {
        if (isDragging) return; 
        document.querySelectorAll('#dayunRow .item-box').forEach(el => el.classList.remove('active'));
        const box = document.getElementById(`dy-box-${dyIndex}`);
        if(box) box.classList.add('active');

        const liuNians = globalDaYuns[dyIndex].getLiuNian(); 
        let html = '';
        liuNians.forEach((ln, lnIndex) => {
            const gz = ln.getGanZhi();
            const gan = gz.charAt(0); const zhi = gz.charAt(1);
            html += `
                <div class="item-box" id="ln-box-${lnIndex}" onclick="selectLiuNian(${dyIndex}, lnIndex)">
                    <div class="top-text">${ln.getYear()}</div>
                    <div class="top-text">${ln.getAge()}岁</div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, gan, false, true)}</span><span class="ganzhi-text" style="color:${getColor(gan)}">${gan}</span></div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, zhi, true, true)}</span><span class="ganzhi-text" style="color:${getColor(zhi)}">${zhi}</span></div>
                    ${formatMiniCangGan(globalDayGan, zhi)}
                </div>`;
        });
        document.getElementById('liunianRow').innerHTML = html;
        selectLiuNian(dyIndex, 0); 
    }

    function selectLiuNian(dyIndex, lnIndex) {
        if (isDragging) return;
        document.querySelectorAll('#liunianRow .item-box').forEach(el => el.classList.remove('active'));
        const box = document.getElementById(`ln-box-${lnIndex}`);
        if(box) box.classList.add('active');

        const liuYues = globalDaYuns[dyIndex].getLiuNian()[lnIndex].getLiuYue(); 
        let html = '';
        liuYues.forEach((ly, lyIndex) => {
            const gz = ly.getGanZhi();
            const gan = gz.charAt(0); const zhi = gz.charAt(1);
            html += `
                <div class="item-box" id="ly-box-${lyIndex}" onclick="selectLiuYue(${dyIndex}, ${lnIndex}, ${lyIndex})">
                    <div class="top-text">${ly.getMonthInChinese()}月</div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, gan, false, true)}</span><span class="ganzhi-text" style="color:${getColor(gan)}">${gan}</span></div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, zhi, true, true)}</span><span class="ganzhi-text" style="color:${getColor(zhi)}">${zhi}</span></div>
                    ${formatMiniCangGan(globalDayGan, zhi)}
                </div>`;
        });
        document.getElementById('liuyueRow').innerHTML = html;
        selectLiuYue(dyIndex, lnIndex, 0); 
    }

    function selectLiuYue(dyIndex, lnIndex, lyIndex) {
        if (isDragging) return;
        document.querySelectorAll('#liuyueRow .item-box').forEach(el => el.classList.remove('active'));
        const box = document.getElementById(`ly-box-${lyIndex}`);
        if(box) box.classList.add('active');

        const ln = globalDaYuns[dyIndex].getLiuNian()[lnIndex];
        const ly = ln.getLiuYue()[lyIndex];

        let monthIdx = typeof ly.getIndex === 'function' ? ly.getIndex() : lyIndex;
        let jsYear = ln.getYear();
        let jsMonth = monthIdx + 1; 
        if (jsMonth > 11) { jsMonth -= 12; jsYear++; }

        let jsDate = new Date(jsYear, jsMonth, 1);
        let html = '';
        let firstDayGan = ''; 
        
        for (let i = 0; i < 35; i++) {
            let curLunar = Lunar.fromDate(jsDate);
            let bazi = curLunar.getEightChar();
            let gan = bazi.getDayGan(); const zhi = bazi.getDayZhi();
            if(i === 0) firstDayGan = gan; 
            
            // 核心修复：流日采用 X月X日 格式 + 农历显示
            let displaySolar = `${jsDate.getMonth() + 1}月${jsDate.getDate()}日`;
            let lunarText = curLunar.getDayInChinese();
            if (lunarText === '初一') lunarText = curLunar.getMonthInChinese() + '月'; // 初一自动显示月份，更直观
            
            html += `
                <div class="item-box" id="lr-box-${i}" onclick="selectLiuRi('${gan}', ${i})">
                    <div class="top-text" style="color:#2c3e50; font-weight:600;">${displaySolar}</div>
                    <div class="top-text" style="font-size:11px; margin-bottom:4px;">农历${lunarText}</div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, gan, false, true)}</span><span class="ganzhi-text" style="color:${getColor(gan)}">${gan}</span></div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, zhi, true, true)}</span><span class="ganzhi-text" style="color:${getColor(zhi)}">${zhi}</span></div>
                    ${formatMiniCangGan(globalDayGan, zhi)}
                </div>`;
            jsDate.setDate(jsDate.getDate() + 1); 
        }
        document.getElementById('liuriRow').innerHTML = html;
        selectLiuRi(firstDayGan, 0); 
    }

    function selectLiuRi(dayGan, lrIndex) {
        if (isDragging) return;
        document.querySelectorAll('#liuriRow .item-box').forEach(el => el.classList.remove('active'));
        const box = document.getElementById(`lr-box-${lrIndex}`);
        if(box) box.classList.add('active');

        const shichenZhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
        const hourGanMap = { '甲':'甲', '己':'甲', '乙':'丙', '庚':'丙', '丙':'戊', '辛':'戊', '丁':'庚', '壬':'庚', '戊':'壬', '癸':'壬' };
        const startGan = hourGanMap[dayGan] || '甲';
        const ganArray = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
        let startIndex = ganArray.indexOf(startGan);

        let html = '';
        for(let i=0; i < 12; i++) {
            let gan = ganArray[(startIndex + i) % 10];
            let zhi = shichenZhi[i];
            let timeStr = i === 0 ? "23-1点" : `${i*2-1}-${i*2+1}点`;
            
            html += `
                <div class="item-box" id="ls-box-${i}" onclick="selectLiuShi(${i})">
                    <div class="top-text">${timeStr}</div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, gan, false, true)}</span><span class="ganzhi-text" style="color:${getColor(gan)}">${gan}</span></div>
                    <div class="gz-row"><span class="ss-text">${getSS(globalDayGan, zhi, true, true)}</span><span class="ganzhi-text" style="color:${getColor(zhi)}">${zhi}</span></div>
                    ${formatMiniCangGan(globalDayGan, zhi)}
                </div>`;
        }
        document.getElementById('liushiRow').innerHTML = html;
        selectLiuShi(0); 
    }

    function selectLiuShi(lsIndex) {
        if (isDragging) return;
        document.querySelectorAll('#liushiRow .item-box').forEach(el => el.classList.remove('active'));
        const box = document.getElementById(`ls-box-${lsIndex}`);
        if(box) box.classList.add('active');
    }

    // 核心修复：更新锚点匹配逻辑以适应“X月X日”格式
    function snapToNow() {
        if(!globalTrueSolarDate) return;
        const now = new Date(); 
        const nowLunar = Lunar.fromDate(now); 
        const nowBazi = nowLunar.getEightChar();
        const nowYear = now.getFullYear(); 
        
        const targetNianGz = nowBazi.getYearGan() + nowBazi.getYearZhi();
        const targetYueGz = nowBazi.getMonthGan() + nowBazi.getMonthZhi();

        let dyIndex = 0; let lnIndex = 0; let found = false;
        for (let i = 0; i < 10; i++) { 
            if (!globalDaYuns[i]) continue;
            let lnList = globalDaYuns[i].getLiuNian();
            for(let j=0; j < lnList.length; j++) {
                if (Math.abs(lnList[j].getYear() - nowYear) <= 1 && lnList[j].getGanZhi() === targetNianGz) {
                    dyIndex = i; lnIndex = j; found = true; break;
                }
            }
            if(found) break;
        }
        selectDaYun(dyIndex); selectLiuNian(dyIndex, lnIndex);

        let lyIndex = 0;
        let lyList = globalDaYuns[dyIndex].getLiuNian()[lnIndex].getLiuYue();
        for(let i=0; i < lyList.length; i++) {
            if (lyList[i].getGanZhi() === targetYueGz) { lyIndex = i; break; }
        }
        selectLiuYue(dyIndex, lnIndex, lyIndex);

        let lrIndex = 0;
        // 修改匹配格式
        let targetDateStr = `${now.getMonth() + 1}月${now.getDate()}日`;
        let lrBoxes = document.querySelectorAll('#liuriRow .item-box');
        for(let i=0; i < lrBoxes.length; i++) {
            // 只抓取包含日期的第一个 div 的内容
            if(lrBoxes[i].querySelector('div').innerText === targetDateStr) { lrIndex = i; break; }
        }
        selectLiuRi(nowBazi.getDayGan(), lrIndex);

        let hourIndex = Math.floor((now.getHours() + 1) / 2) % 12;
        selectLiuShi(hourIndex);

        setTimeout(() => {
            document.getElementById(`dy-box-${dyIndex}`)?.scrollIntoView({inline: 'center', behavior: 'smooth'});
            document.getElementById(`ln-box-${lnIndex}`)?.scrollIntoView({inline: 'center', behavior: 'smooth'});
            document.getElementById(`ly-box-${lyIndex}`)?.scrollIntoView({inline: 'center', behavior: 'smooth'});
            document.getElementById(`lr-box-${lrIndex}`)?.scrollIntoView({inline: 'center', behavior: 'smooth'});
            document.getElementById(`ls-box-${hourIndex}`)?.scrollIntoView({inline: 'center', behavior: 'smooth'});
        }, 100); 
    }

    function initDragScroll() {
        const sliders = document.querySelectorAll('.scroll-row');
        sliders.forEach(slider => {
            let isDown = false, startX, scrollLeft;
            slider.addEventListener('mousedown', (e) => {
                isDown = true; isDragging = false; slider.classList.add('active-drag');
                startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('active-drag'); });
            slider.addEventListener('mouseup', () => { isDown = false; slider.classList.remove('active-drag'); setTimeout(() => { isDragging = false; }, 50); });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return; e.preventDefault(); 
                const x = e.pageX - slider.offsetLeft; const walk = (x - startX) * 1.5; 
                if (Math.abs(walk) > 5) isDragging = true;
                slider.scrollLeft = scrollLeft - walk;
            });
        });
    }

    window.onclick = function(event) { let modal = document.getElementById('recordsModal'); if (event.target == modal) modal.style.display = "none"; }

    window.onload = () => { 
        initDragScroll(); 
        
        try {
            const lastState = JSON.parse(localStorage.getItem(LAST_STATE_KEY));
            if (lastState && lastState.time) {
                document.getElementById('userName').value = lastState.name || '';
                document.getElementById('gender').value = lastState.gender || '1';
                document.getElementById('birthTime').value = lastState.time;
                document.getElementById('cityName').value = lastState.cityName || '';
                document.getElementById('longitude').value = lastState.lon || 120.00;
            } else {
                document.getElementById('birthTime').value = "1995-02-06T02:00";
            }
        } catch(e) {
            document.getElementById('birthTime').value = "1995-02-06T02:00";
        }

        initPan(true); 
    };
</script>
